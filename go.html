<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex"/>
<title>Preparing Your Link…</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<!-- MONETAG MULTITAG -->
<script src="//quge5.com/88/tag.min.js" data-zone="222437" async data-cfasync="false"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{min-height:100vh;background:#0a0e1a;color:#e8f0ff;font-family:'Outfit',sans-serif;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(56,120,255,0.15) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 85% 85%,rgba(6,182,212,0.08) 0%,transparent 55%);pointer-events:none;z-index:0}

.ad-top{position:relative;z-index:10;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06);padding:10px 16px;display:flex;flex-direction:column;align-items:center;gap:6px;min-height:70px}
.ad-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#4a6080}
.ad-728{width:728px;max-width:100%;min-height:90px;display:flex;align-items:center;justify-content:center}

main{flex:1;position:relative;z-index:1;display:flex;align-items:center;justify-content:center;padding:24px 16px 40px}
.layout{display:grid;grid-template-columns:160px minmax(0,500px) 160px;gap:20px;width:100%;max-width:860px;align-items:start}
@media(max-width:820px){.layout{grid-template-columns:1fr}.side{display:none}}
.side{display:flex;flex-direction:column;align-items:center;gap:8px;padding-top:4px}
.side-ad{width:150px;min-height:250px;display:flex;align-items:center;justify-content:center}

.card{background:linear-gradient(160deg,#0f1a2e 0%,#0a1220 100%);border:1px solid rgba(255,255,255,0.07);border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.card-head{padding:24px 24px 20px;background:linear-gradient(135deg,rgba(56,120,255,0.08) 0%,transparent 60%);border-bottom:1px solid rgba(255,255,255,0.05)}
.verified-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:#4ade80;font-size:11px;font-weight:600;padding:4px 12px;border-radius:99px;margin-bottom:14px}
.dot-pulse{width:6px;height:6px;background:#22c55e;border-radius:50%;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.7)}}
.file-row{display:flex;align-items:center;gap:14px}
.file-icon{width:50px;height:50px;flex-shrink:0;background:linear-gradient(135deg,#3878ff,#06b6d4);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 16px rgba(56,120,255,0.3)}
.file-name{font-size:18px;font-weight:700;margin-bottom:5px;word-break:break-word;line-height:1.3}
.file-info{display:flex;gap:10px;font-size:12px;color:#6a88b0;flex-wrap:wrap}

.card-body{padding:22px 24px}
.steps{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.step{display:flex;align-items:center;gap:10px;font-size:13px;color:#5a7090;transition:color 0.4s}
.step.active{color:#94b8e0}
.step.done{color:#e8f0ff}
.step-dot{width:22px;height:22px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;transition:all 0.4s}
.step.done .step-dot{background:#22c55e;border-color:#22c55e;color:#fff}
.step.active .step-dot{border-color:#3878ff;color:#7ab0ff}

.timer-section{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:20px;padding:18px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:14px}
.ring-container{position:relative;width:100px;height:100px}
.ring-container svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:6}
.ring-progress{fill:none;stroke:url(#ringGrad);stroke-width:6;stroke-linecap:round;stroke-dasharray:283;stroke-dashoffset:283;transition:stroke-dashoffset 0.9s linear}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-number{font-size:28px;font-weight:700;line-height:1;color:#e8f0ff}
.ring-unit{font-size:10px;color:#4a6080;margin-top:1px;font-weight:500;letter-spacing:0.5px}
.progress-track{width:100%;height:4px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#3878ff,#06b6d4);width:0%;border-radius:99px;transition:width 0.9s linear}
.timer-text{font-size:12px;color:#5a7090;text-align:center}
.timer-text.ready{color:#4ade80!important;font-weight:500}

.btn-main{width:100%;padding:15px 20px;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s}
.btn-main:disabled{background:rgba(255,255,255,0.05);color:#3a5070;cursor:not-allowed}
.btn-main.ready{background:linear-gradient(135deg,#3878ff 0%,#06b6d4 100%);color:#fff;box-shadow:0 6px 24px rgba(56,120,255,0.4)}
.btn-main.ready:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(56,120,255,0.5)}
.btn-main.ready:active{transform:scale(0.98)}
.btn-arrow{font-size:18px;transition:transform 0.2s}
.btn-main.ready:hover .btn-arrow{transform:translateX(4px)}

.note{margin-top:14px;padding:10px 13px;background:rgba(56,120,255,0.05);border:1px solid rgba(56,120,255,0.1);border-radius:9px;font-size:11px;color:#5a7090;line-height:1.6}
.note b{color:#7ab0ff}

.card-ad{padding:16px 24px 20px;border-top:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;align-items:center;gap:4px}
.ad-box{width:300px;max-width:100%;min-height:100px;display:flex;align-items:center;justify-content:center}

footer{position:relative;z-index:1;text-align:center;padding:16px;font-size:11px;color:#2a3a50;border-top:1px solid rgba(255,255,255,0.04)}
footer a{color:#2a3a50;text-decoration:none}

/* Loading / Error states */
.state-box{text-align:center;padding:30px 20px}
.state-icon{font-size:44px;margin-bottom:12px}
.state-title{font-size:18px;font-weight:700;margin-bottom:6px}
.state-msg{font-size:13px;color:#5a7090;line-height:1.6}
.spinner-sm{width:32px;height:32px;border:3px solid rgba(56,120,255,0.1);border-top:3px solid #3878ff;border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="ad-top">
  <div class="ad-label">Advertisement</div>
  <div class="ad-728" id="adTop"></div>
</div>

<main>
  <div class="layout">
    <div class="side"><div class="ad-label">Ad</div><div class="side-ad" id="adLeft"></div></div>

    <div class="card" id="mainCard">
      <div class="card-head">
        <div class="verified-badge"><span class="dot-pulse"></span>Secure &amp; Verified</div>
        <div class="file-row">
          <div class="file-icon">📦</div>
          <div>
            <div class="file-name" id="pgTitle">Loading…</div>
            <div class="file-info">
              <span>☁️ <span id="pgHost">Cloud Storage</span></span>
              <span>🔒 Safe Link</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card-body" id="cardBody">
        <div class="state-box">
          <div class="spinner-sm"></div>
          <div class="state-msg">Loading link data…</div>
        </div>
      </div>

      <div class="card-ad">
        <div class="ad-label">Advertisement</div>
        <div class="ad-box" id="adBottom"></div>
      </div>
    </div>

    <div class="side"><div class="ad-label">Ad</div><div class="side-ad" id="adRight"></div></div>
  </div>
</main>

<footer>&copy; 2025 SecureLink &nbsp;|&nbsp; <a href="#">Privacy Policy</a> &nbsp;|&nbsp; <a href="#">Terms</a></footer>

<script>
var BIN_ID  = '69c10beab7ec241ddc9469e2';
var API_KEY = '$2a$10$p0fNENGAwL1zxcwtSKF8Cu5puR2H6vuDUJmQCr0WRGdfjZyzk4Zuu';
var BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;
var CIRC    = 283;

var params = new URLSearchParams(window.location.search);
var linkId = (params.get('id') || '').trim();

// Load link from JSONBin
fetch(BIN_URL, {
  headers: {
    'X-Master-Key': API_KEY,
    'X-Bin-Meta': 'false'
  }
})
.then(function(r){ return r.json(); })
.then(function(data){
  var links = (data && data.links) ? data.links : [];
  var linkData = null;
  for(var i=0; i<links.length; i++){
    if(links[i].id === linkId){ linkData = links[i]; break; }
  }

  if(!linkData){
    showError('Link Not Found', 'This link does not exist or has been removed.');
    return;
  }

  // Update click count
  linkData.clicks = (linkData.clicks || 0) + 1;
  fetch(BIN_URL, {
    method: 'PUT',
    headers: { 'Content-Type':'application/json', 'X-Master-Key': API_KEY, 'X-Bin-Meta':'false' },
    body: JSON.stringify({ links: links })
  });

  // Setup page
  document.title = linkData.title + ' — SecureLink';
  document.getElementById('pgTitle').textContent = linkData.title;
  document.getElementById('pgHost').textContent  = detectHost(linkData.dest);
  startTimer(linkData);
})
.catch(function(){
  showError('Connection Error', 'Could not load link data. Please try again.');
});

function startTimer(linkData){
  var TOTAL = parseInt(linkData.timer) || 15;
  var rem   = TOTAL;

  document.getElementById('cardBody').innerHTML =
    '<div class="steps">'+
      '<div class="step done" id="s1"><div class="step-dot">✓</div><span>Link verified and secure</span></div>'+
      '<div class="step active" id="s2"><div class="step-dot">2</div><span>Preparing your access…</span></div>'+
      '<div class="step" id="s3"><div class="step-dot">3</div><span>Click button to get your file</span></div>'+
    '</div>'+
    '<div class="timer-section">'+
      '<div class="ring-container">'+
        '<svg width="100" height="100" viewBox="0 0 100 100">'+
          '<defs><linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">'+
            '<stop offset="0%" stop-color="#3878ff"/><stop offset="100%" stop-color="#06b6d4"/>'+
          '</linearGradient></defs>'+
          '<circle class="ring-bg" cx="50" cy="50" r="45"/>'+
          '<circle class="ring-progress" id="ringP" cx="50" cy="50" r="45"/>'+
        '</svg>'+
        '<div class="ring-inner"><div class="ring-number" id="ringN">'+rem+'</div><div class="ring-unit">SEC</div></div>'+
      '</div>'+
      '<div class="progress-track"><div class="progress-fill" id="pFill"></div></div>'+
      '<div class="timer-text" id="tText">Please wait while we prepare your link…</div>'+
    '</div>'+
    '<button class="btn-main" id="mainBtn" disabled>'+
      '<span id="btnLbl">Please wait…</span>'+
      '<span id="btnArr" style="display:none" class="btn-arrow">→</span>'+
    '</button>'+
    '<div class="note"><b>Note:</b> Ads support this free service. Allow ads for best experience. Your link opens after countdown.</div>';

  var ringP = document.getElementById('ringP');
  var ringN = document.getElementById('ringN');
  var pFill = document.getElementById('pFill');
  var tText = document.getElementById('tText');
  var btn   = document.getElementById('mainBtn');
  var s2    = document.getElementById('s2');
  var s3    = document.getElementById('s3');

  ringP.style.strokeDashoffset = CIRC;

  var iv = setInterval(function(){
    rem--;
    var pct = (TOTAL - rem) / TOTAL;
    ringN.textContent = rem < 0 ? 0 : rem;
    ringP.style.strokeDashoffset = CIRC - (CIRC * pct);
    pFill.style.width = (pct * 100) + '%';

    if(rem <= 0){
      clearInterval(iv);
      s2.classList.remove('active'); s2.classList.add('done'); s2.querySelector('.step-dot').textContent = '✓';
      s3.classList.add('active');
      tText.textContent = 'Ready! Click the button below to access your file.';
      tText.classList.add('ready');
      ringN.textContent = '0';
      btn.disabled = false;
      btn.classList.add('ready');
      document.getElementById('btnLbl').textContent = 'Continue to File';
      document.getElementById('btnArr').style.display = 'inline';

      btn.onclick = function(){
        s3.classList.remove('active'); s3.classList.add('done'); s3.querySelector('.step-dot').textContent = '✓';
        btn.disabled = true; btn.classList.remove('ready');
        document.getElementById('btnLbl').textContent = 'Redirecting…';
        document.getElementById('btnArr').style.display = 'none';
        setTimeout(function(){
          window.location.href = 'bridge.html?url=' + encodeURIComponent(linkData.dest) + '&t=' + encodeURIComponent(linkData.title);
        }, 400);
      };
    }
  }, 1000);
}

function showError(title, msg){
  document.getElementById('pgTitle').textContent = title;
  document.getElementById('cardBody').innerHTML =
    '<div class="state-box">'+
    '<div class="state-icon">🔍</div>'+
    '<div class="state-title" style="color:#ef4444">'+title+'</div>'+
    '<div class="state-msg">'+msg+'</div>'+
    '</div>';
}

function detectHost(url){
  try{
    var h = new URL(url).hostname.toLowerCase();
    if(h.indexOf('terabox')>-1) return 'Terabox';
    if(h.indexOf('google')>-1)  return 'Google Drive';
    if(h.indexOf('mega')>-1)    return 'Mega.nz';
    if(h.indexOf('mediafire')>-1) return 'MediaFire';
    if(h.indexOf('dropbox')>-1) return 'Dropbox';
    return 'Cloud Storage';
  }catch(e){ return 'Cloud Storage'; }
}
</script>
</body>
</html>
