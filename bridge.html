    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            background: white;
            border-radius: 16px;
            padding: 36px 28px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            animation: popIn 0.5s ease;
        }
        @keyframes popIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .logo { font-size: 22px; font-weight: 900; color: #0f3460; margin-bottom: 20px; }
        .logo span { color: #e94560; }
        .spinner-wrap { width:80px; height:80px; margin:0 auto 20px; position:relative; }
        .spinner { width:80px; height:80px; border-radius:50%; border:4px solid #f0f4ff; border-top:4px solid #0f3460; border-right:4px solid #e94560; animation:spin 1s linear infinite; }
        @keyframes spin{to{transform:rotate(360deg)}}
        .spinner-icon { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:28px; }
        h2 { color:#1a1a2e; font-size:20px; margin-bottom:8px; }
        .sub { font-size:14px; color:#666; margin-bottom:24px; line-height:1.6; }
        .big-count { font-size:64px; font-weight:900; color:#0f3460; line-height:1; margin-bottom:4px; }
        .count-label { font-size:12px; color:#888; margin-bottom:16px; }
        .bar-bg { background:#e9ecef; border-radius:99px; height:8px; overflow:hidden; margin-bottom:20px; }
        .bar-fill { height:100%; background:linear-gradient(90deg,#0f3460,#e94560); border-radius:99px; width:0%; transition:width 0.9s linear; }
        .steps { display:flex; flex-direction:column; gap:10px; text-align:left; margin-bottom:20px; background:#f8f9fa; border-radius:10px; padding:14px 16px; }
        .bstep { display:flex; align-items:center; gap:10px; font-size:13px; color:#888; transition:color 0.3s; }
        .bstep.done { color:#155724; }
        .bstep.active { color:#0f3460; font-weight:600; }
        .bicon { width:22px; height:22px; border-radius:50%; border:2px solid #ddd; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; transition:all 0.3s; }
        .bstep.done .bicon { background:#28a745; border-color:#28a745; color:white; }
        .bstep.active .bicon { border-color:#0f3460; color:#0f3460; }
        .btn-manual { display:none; width:100%; padding:14px; background:linear-gradient(135deg,#0f3460,#e94560); color:white; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; margin-bottom:14px; transition:all 0.2s; }
        .btn-manual:hover { transform:translateY(-2px); }
        .ad-wrap { margin-top:16px; display:flex; flex-direction:column; align-items:center; gap:4px; }
        .ad-label { font-size:10px; color:#aaa; text-transform:uppercase; letter-spacing:1px; }
        footer { font-size:11px; color:#aaa; margin-top:16px; }
    </style>

<body>
<div class="box">
    <div class="logo">Tera<span>Shares</span></div>

    <div class="spinner-wrap">
        <div class="spinner"></div>
        <div class="spinner-icon">🔗</div>
    </div>

    <h2>Opening Your File…</h2>
    <div class="sub" id="bridgeSub">Establishing secure connection…<br/>Redirecting in <strong id="countTxt">15</strong> seconds.</div>

    <div class="big-count" id="bigCount">15</div>
    <div class="count-label">SECONDS REMAINING</div>

    <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>

    <div class="steps">
        <div class="bstep done"><div class="bicon">✓</div><span>Countdown completed</span></div>
        <div class="bstep done"><div class="bicon">✓</div><span>Ad session verified</span></div>
        <div class="bstep active" id="bs3"><div class="bicon">3</div><span>Decrypting destination…</span></div>
        <div class="bstep" id="bs4"><div class="bicon">4</div><span>Redirecting to your file</span></div>
    </div>

    <button class="btn-manual" id="manualBtn" onclick="goNow()">Open File Now →</button>

    <div class="ad-wrap">
        <div class="ad-label">Advertisement</div>
        <!-- ADSTERRA BANNER AD (300x250) -->
        <script type="text/javascript">
        atOptions = {
          'key' : '0e79820e461d0f455fea3e18fdc33564',
          'format' : 'iframe',
          'height' : 250,
          'width' : 300,
          'params' : {}
        };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/0e79820e461d0f455fea3e18fdc33564/invoke.js"></script>
    </div>

    <footer>&copy; 2025 TeraShares</footer>
</div>

<script>
var params  = new URLSearchParams(window.location.search);
var destURL = params.get('url') ? decodeURIComponent(params.get('url')) : '';
var TOTAL   = 15;
var left    = TOTAL;

var barFill  = document.getElementById('barFill');
var bigCount = document.getElementById('bigCount');
var countTxt = document.getElementById('countTxt');
var bs3      = document.getElementById('bs3');
var bs4      = document.getElementById('bs4');
var sub      = document.getElementById('bridgeSub');
var manBtn   = document.getElementById('manualBtn');

if(!destURL){
    sub.textContent = 'Error: No destination found. Please go back.';
    manBtn.style.display = 'block';
}

setTimeout(function(){
    bs3.classList.remove('active'); bs3.classList.add('done');
    bs3.querySelector('.bicon').textContent = '✓';
    bs4.classList.add('active');
}, 2000);

var iv = setInterval(function(){
    left--;
    var pct = ((TOTAL - left) / TOTAL) * 100;
    bigCount.textContent = left < 0 ? 0 : left;
    countTxt.textContent = left < 0 ? 0 : left;
    barFill.style.width = pct + '%';

    if(left <= 0){
        clearInterval(iv);
        bs4.classList.remove('active'); bs4.classList.add('done');
        bs4.querySelector('.bicon').textContent = '✓';
        sub.innerHTML = 'Redirecting now…';
        bigCount.textContent = '0';
        manBtn.style.display = 'block';
        if(destURL) setTimeout(function(){ window.location.href = destURL; }, 300);
    }
}, 1000);

setTimeout(function(){ manBtn.style.display = 'block'; }, 18000);

function goNow(){ if(destURL) window.location.href = destURL; }
</script>
</body>
</html>
