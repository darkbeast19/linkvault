<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Opening Your File — TeraShares</title>

    <!-- MONETAG: Single popup only -->
    <script src="https://quge5.com/88/tag.min.js" data-zone="222437" async data-cfasync="false"></script>

    <style>
        *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a0808 0%, #2d1010 50%, #4a1515 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            background: white;
            border-radius: 16px;
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: popIn 0.5s ease;
        }
        @keyframes popIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        .logo { font-size: 22px; font-weight: 900; color: #b91c1c; margin-bottom: 20px; }
        .logo span { color: #ef4444; }

        /* Spinner */
        .spinner-wrap { width: 80px; height: 80px; margin: 0 auto 20px; position: relative; }
        .spinner {
            width: 80px; height: 80px; border-radius: 50%;
            border: 4px solid #fff5f5;
            border-top: 4px solid #b91c1c;
            border-right: 4px solid #ef4444;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; }

        h2 { color: #1a1a1a; font-size: 20px; margin-bottom: 8px; }
        .sub { font-size: 14px; color: #6b7280; margin-bottom: 20px; line-height: 1.6; }

        /* Big countdown */
        .big-count { font-size: 64px; font-weight: 900; color: #b91c1c; line-height: 1; margin-bottom: 4px; }
        .count-label { font-size: 12px; color: #9ca3af; margin-bottom: 14px; }

        /* Progress bar */
        .bar-bg { background: #f3f4f6; border-radius: 99px; height: 8px; overflow: hidden; margin-bottom: 20px; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #b91c1c, #ef4444); border-radius: 99px; width: 0%; transition: width 0.9s linear; }

        /* Steps */
        .steps {
            display: flex; flex-direction: column; gap: 10px;
            text-align: left; background: #fafafa;
            border-radius: 10px; padding: 14px 16px; margin-bottom: 18px;
        }
        .bstep { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #9ca3af; transition: color 0.3s; }
        .bstep.done   { color: #166534; }
        .bstep.active { color: #b91c1c; font-weight: 600; }
        .bicon {
            width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid #e5e7eb;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 700; flex-shrink: 0; transition: all 0.3s;
        }
        .bstep.done   .bicon { background: #16a34a; border-color: #16a34a; color: white; }
        .bstep.active .bicon { border-color: #b91c1c; color: #b91c1c; }

        /* Manual button */
        .btn-manual {
            display: none; width: 100%; padding: 14px;
            background: linear-gradient(135deg, #b91c1c, #ef4444);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            margin-bottom: 14px; transition: all 0.2s;
        }
        .btn-manual:hover { transform: translateY(-2px); }

        /* Ad banner */
        .ad-wrap { margin-top: 16px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .ad-tag  { font-size: 9px; color: #d1d5db; text-transform: uppercase; letter-spacing: 1px; }
        .ad-wrap iframe { display: block !important; width: 300px !important; height: 250px !important; }

        footer { font-size: 11px; color: #9ca3af; margin-top: 16px; }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">Tera<span>Shares</span></div>

    <div class="spinner-wrap">
        <div class="spinner"></div>
        <div class="spinner-icon">🔗</div>
    </div>

    <h2>Opening Your File…</h2>
    <div class="sub" id="bridgeSub">
        Establishing secure connection…<br/>
        Redirecting in <strong id="countTxt">10</strong> seconds.
    </div>

    <div class="big-count" id="bigCount">10</div>
    <div class="count-label">SECONDS REMAINING</div>

    <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>

    <div class="steps">
        <div class="bstep done"><div class="bicon">✓</div><span>Countdown completed</span></div>
        <div class="bstep done"><div class="bicon">✓</div><span>Access verified</span></div>
        <div class="bstep active" id="bs3"><div class="bicon">3</div><span>Decrypting destination…</span></div>
        <div class="bstep" id="bs4"><div class="bicon">4</div><span>Redirecting to your file</span></div>
    </div>

    <button class="btn-manual" id="manualBtn" onclick="goNow()">Open File Now →</button>

    <!-- ══ ADSTERRA BANNER — single, clean ══ -->
    <div class="ad-wrap">
        <div class="ad-tag">Advertisement</div>
        <script type="text/javascript">
            atOptions = {
                'key' : '0e79820e461d0f455fea3e18fdc33564',
                'format' : 'iframe',
                'height' : 250,
                'width' : 300,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/0e79820e461d0f455fea3e18fdc33564/invoke.js"></script>
    </div>

    <footer>&copy; 2025 TeraShares — Secure File Sharing</footer>
</div>

<script>
var params  = new URLSearchParams(window.location.search);
var destURL = params.get('url') ? decodeURIComponent(params.get('url')) : '';
var TOTAL   = 10;
var left    = TOTAL;

var barFill  = document.getElementById('barFill');
var bigCount = document.getElementById('bigCount');
var countTxt = document.getElementById('countTxt');
var bs3      = document.getElementById('bs3');
var bs4      = document.getElementById('bs4');
var sub      = document.getElementById('bridgeSub');
var manBtn   = document.getElementById('manualBtn');

if (!destURL) {
    sub.textContent = 'Error: No destination found. Please go back.';
    manBtn.style.display = 'block';
}

// Step 3 → done at 2s
setTimeout(function() {
    bs3.classList.remove('active'); bs3.classList.add('done');
    bs3.querySelector('.bicon').textContent = '✓';
    bs4.classList.add('active');
}, 2000);

// Show manual button at 8s as fallback
setTimeout(function() { manBtn.style.display = 'block'; }, 8000);

var iv = setInterval(function() {
    left--;
    var pct = ((TOTAL - left) / TOTAL) * 100;
    bigCount.textContent = left < 0 ? 0 : left;
    countTxt.textContent = left < 0 ? 0 : left;
    barFill.style.width  = pct + '%';

    if (left <= 0) {
        clearInterval(iv);
        bs4.classList.remove('active'); bs4.classList.add('done');
        bs4.querySelector('.bicon').textContent = '✓';
        sub.innerHTML = 'Redirecting now…';
        bigCount.textContent = '0';
        manBtn.style.display = 'block';
        if (destURL) setTimeout(function() { window.location.href = destURL; }, 300);
    }
}, 1000);

function goNow() { if (destURL) window.location.href = destURL; }
</script>
</body>
</html>
